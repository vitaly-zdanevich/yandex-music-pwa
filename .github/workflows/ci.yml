name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  web:
    name: Web tests and production build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:web
      - name: Build production PWA
        run: npm run build
        env:
          VITE_API_BASE_URL: https://ezsc7kdtvlfw3kc2tgb27eqube0ejqdu.lambda-url.eu-central-1.on.aws
          VITE_BASE_PATH: /yandex-music-pwa/
      - name: Upload GitHub Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  rust:
    name: Rust proxy tests and ARM64 check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: proxy
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt
          targets: aarch64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: proxy
      - uses: taiki-e/install-action@a6b2e2dcd845ddd7f509ce4f3ed3d922b80cc5d9 # v2.84.0
        with:
          tool: cargo-lambda@1.9.1
          fallback: none
      - run: cargo fmt --check
      - run: cargo test --locked
      - run: cargo clippy --all-targets --locked -- -D warnings
      - name: Link native Lambda ARM64 target
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_RUSTFLAGS: -C target-cpu=neoverse-n1
          ZIG_GLOBAL_CACHE_DIR: ${{ runner.temp }}/zig-global-cache
          ZIG_LOCAL_CACHE_DIR: ${{ runner.temp }}/zig-local-cache
        run: cargo lambda build --release --locked --arm64 --bin bootstrap

  terraform:
    name: Terraform validation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform
    steps:
      - uses: actions/checkout@v7
      - uses: hashicorp/setup-terraform@v3
      - run: terraform fmt -check -recursive
      - run: terraform init -backend=false
      - run: terraform validate

  deploy-pages:
    name: Deploy GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [web, rust, terraform]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy PWA
        id: deployment
        uses: actions/deploy-pages@v5
