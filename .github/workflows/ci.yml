name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  web:
    name: Web tests and production build
    if: github.event_name != 'push' || github.event.deleted != true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - name: Fetch the previous push tip when history was rewritten
        if: github.event_name == 'push' && github.event.deleted != true
        env:
          VERSION_BASE_SHA: ${{ github.event.before }}
        run: |
          if [[ ! "$VERSION_BASE_SHA" =~ ^0+$ ]] && ! git cat-file -e "$VERSION_BASE_SHA^{commit}" 2>/dev/null; then
            git fetch --no-tags --depth=1 origin "$VERSION_BASE_SHA"
          fi
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Require a SemVer increment in every commit
        run: npm run check:version
        env:
          VERSION_BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          VERSION_HEAD_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          VERSION_EVENT_NAME: ${{ github.event_name }}
          VERSION_BASE_REF: ${{ github.event_name == 'pull_request' && github.base_ref || github.event.repository.default_branch }}
      - run: npm run test:web
      - name: Build production PWA
        run: npm run build
        env:
          VITE_API_BASE_URL: https://ezsc7kdtvlfw3kc2tgb27eqube0ejqdu.lambda-url.eu-central-1.on.aws
          VITE_BASE_PATH: /yandex-music-pwa/
      - name: Upload GitHub Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: dist

  rust:
    name: Rust proxy tests and ARM64 check
    if: github.event_name != 'push' || github.event.deleted != true
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: proxy
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4
        with:
          toolchain: 1.94.1
          components: clippy,rustfmt
          targets: aarch64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: proxy
      - uses: taiki-e/install-action@a6b2e2dcd845ddd7f509ce4f3ed3d922b80cc5d9 # v2.84.0
        with:
          tool: cargo-lambda@1.9.1
          fallback: none
      - name: Install Zig 0.15.1
        env:
          ZIG_ARCHIVE: ${{ runner.temp }}/zig-0.15.1.tar.xz
          ZIG_ARCHIVE_SHA256: c61c5da6edeea14ca51ecd5e4520c6f4189ef5250383db33d01848293bfafe05
          ZIG_DIR: ${{ runner.temp }}/zig-0.15.1
        run: |
          curl --fail --silent --show-error --location \
            https://ziglang.org/download/0.15.1/zig-x86_64-linux-0.15.1.tar.xz \
            --output "$ZIG_ARCHIVE"
          echo "$ZIG_ARCHIVE_SHA256  $ZIG_ARCHIVE" | sha256sum --check --strict
          mkdir "$ZIG_DIR"
          tar --extract --xz --file "$ZIG_ARCHIVE" --strip-components 1 --directory "$ZIG_DIR"
          echo "$ZIG_DIR" >> "$GITHUB_PATH"
      - run: cargo fmt --check
      - run: cargo test --locked
      - run: cargo clippy --all-targets --locked -- -D warnings
      - name: Link native Lambda ARM64 target
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_RUSTFLAGS: -C target-cpu=neoverse-n1
          ZIG_GLOBAL_CACHE_DIR: ${{ runner.temp }}/zig-global-cache
          ZIG_LOCAL_CACHE_DIR: ${{ runner.temp }}/zig-local-cache
        run: cargo lambda build --release --locked --arm64 --bin bootstrap

  terraform:
    name: Terraform validation
    if: github.event_name != 'push' || github.event.deleted != true
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4
      - run: terraform fmt -check -recursive
      - run: terraform init -backend=false
      - run: terraform validate

  deploy-pages:
    name: Deploy GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [web, rust, terraform]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy PWA
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
